name: Update Contribution Heatmap

on:
  schedule:
    - cron: '17 6 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
      
      - name: Fetch contributions
        env:
          GITHUB_ACTOR: ${{ github.repository_owner }}
        run: cd scripts && python fetch_contributions.py
      
      - name: Render heatmap
        run: cd scripts && python render_heatmap_svg.py
      
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update contribution heatmap'
          file_pattern: 'contrib-heatmap.svg data/contributions.json'
